<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé luyện phát âm</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffeb3b 0%, #ff80ab 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Khung bảng học tập ma thuật */
        .magic-box {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 20px 0 #c2185b, 0 25px 50px rgba(0,0,0,0.2);
            border: 8px solid #ff4081;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
            text-align: center;
        }

        /* Tiêu đề chính uốn lượn đáng yêu */
        .main-title {
            font-family: 'Fredoka One', cursive;
            color: #ff3d00;
            font-size: 3.5rem;
            text-shadow: 4px 4px 0px #ffeb3b, 8px 8px 0px rgba(0,0,0,0.05);
            margin: 10px 0 35px 0;
            display: inline-block;
            animation: bounceTitle 2s ease-in-out infinite alternate;
        }

        @keyframes bounceTitle {
            0% { transform: translateY(0) rotate(-2deg); }
            100% { transform: translateY(-10px) rotate(2deg); }
        }

        .sticker {
            position: absolute;
            user-select: none;
            z-index: 1;
            filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.1));
        }
        .sun { top: -40px; right: -40px; font-size: 5rem; animation: spinSun 20s linear infinite; }
        .balloon1 { bottom: 50px; left: -80px; font-size: 4rem; animation: floatUp 6s ease-in-out infinite; }
        .balloon2 { top: 150px; right: -80px; font-size: 3.5rem; animation: floatUp 8s ease-in-out infinite 1s; }
        .rainbow-decor { top: -60px; left: -40px; font-size: 5rem; animation: sway 4s ease-in-out infinite alternate; }
        .lollipop { bottom: -30px; right: -30px; font-size: 4.5rem; animation: sway 3s ease-in-out infinite alternate; }

        @keyframes spinSun { 100% { transform: rotate(360deg); } }
        @keyframes floatUp {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        @keyframes sway {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        .sound-section {
            background: #e0f7fa;
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 40px;
            border: 4px dashed #00bcd4;
            box-shadow: inset 0 0 20px rgba(0, 188, 212, 0.15);
            position: relative;
        }

        /* Đám mây chứa tên cặp âm */
        .cloud-title {
            background: linear-gradient(135deg, #00e5ff, #00b0ff);
            color: white;
            font-size: 1.8rem;
            padding: 12px 35px;
            border-radius: 50px;
            display: inline-block;
            margin-top: -55px;
            margin-bottom: 30px;
            box-shadow: 0 6px 0 #0077c2, 0 10px 20px rgba(0,0,0,0.1);
            font-family: 'Fredoka One', cursive;
        }

        .cards-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card-box {
            background: white;
            border: 4px solid #ffbc00;
            border-radius: 25px;
            padding: 20px;
            width: 42%;
            min-width: 260px;
            box-shadow: 0 10px 0 #ffbc00, 0 15px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            transition: transform 0.2s;
        }

        .card-box:hover {
            transform: scale(1.02);
        }

        /* Khung tranh hoạt hình minh họa */
        .avatar-frame {
            width: 140px;
            height: 140px;
            background: #fffde7;
            border: 4px solid #4caf50;
            border-radius: 20px;
            box-shadow: 0 6px 0 #4caf50;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Chữ cái đích to rõ ràng cho học sinh lớp 1 */
        .big-letter {
            font-family: 'Fredoka One', cursive;
            font-size: 4.5rem; /* Tăng cỡ chữ cực lớn */
            color: #2e7d32;
            margin: 5px 0 15px 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #c8e6c9;
        }

        /* Nút "Cô Đọc" đồ chơi */
        .btn-toy {
            background: linear-gradient(135deg, #ff9800, #ff5722);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 0 #e64a19;
            transition: all 0.1s;
            margin-bottom: 10px;
            width: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Quicksand', sans-serif;
        }

        .btn-toy:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #e64a19;
        }

        /* Nút Micro "Bé Nói" */
        .btn-mic {
            background: linear-gradient(135deg, #9c27b0, #e91e63);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 0 #ad1457;
            transition: all 0.1s;
            width: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Quicksand', sans-serif;
        }

        .btn-mic:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #ad1457;
        }

        /* Trạng thái sóng micro nhấp nháy khi đang ghi âm */
        .listening {
            animation: pulseMic 1s infinite alternate;
            background: linear-gradient(135deg, #4caf50, #00e676) !important;
            box-shadow: 0 5px 0 #2e7d32 !important;
        }

        @keyframes pulseMic {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        /* Chữ nối "với" dễ thương ở giữa */
        .vs-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: #ff4081;
            text-shadow: 2px 2px 0px #f8bbd0;
            margin: 15px 0;
            animation: swing 3s ease-in-out infinite alternate;
        }

        @keyframes swing {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        /* Hộp thoại bóng bóng báo trạng thái khi micro hoạt động */
        .status-bubble {
            background: #fff;
            border: 4px solid #ab47bc;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ab47bc;
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 100;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            0% { transform: translateX(-50%) translateY(50px) scale(0.5); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        }

        /* Pháo bông ăn mừng khi bé trả lời đúng */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- Các Sticker trang trí -->
<div class="sticker sun">☀️</div>
<div class="sticker rainbow-decor">🌈</div>
<div class="sticker balloon1">🎈</div>
<div class="sticker balloon2">🎈</div>
<div class="sticker lollipop">🍭</div>

<div class="magic-box">
    <h1 class="main-title">✨ Bé Luyện Phát Âm ✨</h1>

    <div class="sound-section">
        <span class="cloud-title">☁️ Cặp âm: ch - tr ☁️</span>
        <div class="cards-container">
            <!-- Thẻ chữ CHA -->
            <div class="card-box">
                <div class="avatar-frame">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <circle cx="50" cy="30" r="16" fill="#ffb74d"/>
                        <circle cx="50" cy="28" r="12" fill="#ffe082"/>
                        <path d="M 42 28 Q 50 20 58 28" stroke="#3e2723" stroke-width="3" fill="none"/>
                        <circle cx="45" cy="28" r="2" fill="#000"/>
                        <circle cx="55" cy="28" r="2" fill="#000"/>
                        <path d="M 45 34 Q 50 38 55 34" stroke="#e91e63" stroke-width="3" fill="none"/>
                        <path d="M25 75 C25 55, 75 55, 75 75 L70 95 L30 95 Z" fill="#29b6f6"/>
                        <circle cx="50" cy="65" r="10" fill="#ffe082"/>
                    </svg>
                </div>
                <div class="big-letter">cha</div>
                <button class="btn-toy" onclick="playAudio('cha.aac')">🔊 Cô Đọc</button>
                <button class="btn-mic" onclick="startListening('cha', 'cha.aac', this)">🎙️ Bé Nói</button>
            </div>

            <div class="vs-text">với</div>

            <!-- Thẻ chữ TRA -->
            <div class="card-box">
                <div class="avatar-frame">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <path d="M 10 90 L 90 90" stroke="#8d6e63" stroke-width="8" stroke-linecap="round"/>
                        <path d="M 50 90 Q 50 40 35 30 Q 50 45 50 90" fill="#4caf50"/>
                        <path d="M 50 80 Q 50 35 65 25 Q 50 40 50 80" fill="#4caf50"/>
                        <circle cx="50" cy="90" r="6" fill="#ffeb3b"/>
                    </svg>
                </div>
                <div class="big-letter">tra</div>
                <button class="btn-toy" onclick="playAudio('tra.aac')">🔊 Cô Đọc</button>
                <button class="btn-mic" onclick="startListening('tra', 'tra.aac', this)">🎙️ Bé Nói</button>
            </div>
        </div>
    </div>

    <div class="sound-section" style="border-color: #ff4081; background: #fff0f5;">
        <span class="cloud-title" style="background: linear-gradient(135deg, #ff4081, #f50057);">☁️ Cặp âm: d - gi ☁️</span>
        <div class="cards-container">
            <!-- Thẻ chữ DA -->
            <div class="card-box" style="border-color: #ff4081;">
                <div class="avatar-frame" style="border-color: #ff4081;">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <circle cx="50" cy="50" r="35" fill="#ffdbb5"/>
                        <circle cx="38" cy="45" r="4" fill="#000"/>
                        <circle cx="62" cy="45" r="4" fill="#000"/>
                        <path d="M 40 62 Q 50 72 60 62" stroke="#e91e63" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <circle cx="28" cy="58" r="6" fill="#ff80ab" opacity="0.6"/>
                        <circle cx="72" cy="58" r="6" fill="#ff80ab" opacity="0.6"/>
                    </svg>
                </div>
                <div class="big-letter" style="color: #d81b60;">da</div>
                <button class="btn-toy" style="background: linear-gradient(135deg, #ff4081, #f50057); box-shadow: 0 5px 0 #c2185b;" onclick="playAudio('da.aac')">🔊 Cô Đọc</button>
                <button class="btn-mic" onclick="startListening('da', 'da.aac', this)">🎙️ Bé Nói</button>
            </div>

            <div class="vs-text">với</div>

            <!-- Thẻ chữ GIA -->
            <div class="card-box" style="border-color: #ff4081;">
                <div class="avatar-frame" style="border-color: #ff4081;">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <polygon points="50,15 15,50 85,50" fill="#ff5252"/>
                        <rect x="25" y="50" width="50" height="40" fill="#ffe082"/>
                        <rect x="42" y="65" width="16" height="25" fill="#8d6e63"/>
                        <rect x="32" y="56" width="10" height="10" fill="#e0f7fa"/>
                    </svg>
                </div>
                <div class="big-letter" style="color: #d81b60;">gia</div>
                <button class="btn-toy" style="background: linear-gradient(135deg, #ff4081, #f50057); box-shadow: 0 5px 0 #c2185b;" onclick="playAudio('gia.aac')">🔊 Cô Đọc</button>
                <button class="btn-mic" onclick="startListening('gia', 'gia.aac', this)">🎙️ Bé Nói</button>
            </div>
        </div>
    </div>

    <div class="sound-section" style="border-color: #4caf50; background: #e8f5e9;">
        <span class="cloud-title" style="background: linear-gradient(135deg, #4caf50, #2e7d32);">☁️ Cặp âm: l - n ☁️</span>
        <div class="cards-container">
            <!-- Thẻ chữ LA -->
            <div class="card-box" style="border-color: #4caf50;">
                <div class="avatar-frame" style="border-color: #4caf50;">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <path d="M20 40 L40 40 L65 20 L65 80 L40 60 L20 60 Z" fill="#90a4ae"/>
                        <path d="M72 40 Q78 50 72 60" stroke="#ff9800" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M79 32 Q89 50 79 68" stroke="#ff5722" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="big-letter" style="color: #2e7d32;">la</div>
                <button class="btn-toy" style="background: linear-gradient(135deg, #4caf50, #2e7d32); box-shadow: 0 5px 0 #1b5e20;" onclick="playAudio('la.aac')">🔊 Cô Đọc</button>
                <button class="btn-mic" onclick="startListening('la', 'la.aac', this)">🎙️ Bé Nói</button>
            </div>

            <div class="vs-text">với</div>

            <!-- Thẻ chữ NA -->
            <div class="card-box" style="border-color: #4caf50;">
                <div class="avatar-frame" style="border-color: #4caf50;">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <circle cx="50" cy="55" r="30" fill="#a5d6a7"/>
                        <circle cx="42" cy="42" r="8" fill="#81c784"/>
                        <circle cx="58" cy="42" r="8" fill="#81c784"/>
                        <circle cx="35" cy="55" r="8" fill="#81c784"/>
                        <circle cx="50" cy="55" r="8" fill="#81c784"/>
                        <circle cx="65" cy="55" r="8" fill="#81c784"/>
                        <path d="M50 25 Q55 10 50 5" stroke="#8d6e63" stroke-width="4" fill="none"/>
                    </svg>
                </div>
                <div class="big-letter" style="color: #2e7d32;">na</div>
                <button class="btn-toy" style="background: linear-gradient(135deg, #4caf50, #2e7d32); box-shadow: 0 5px 0 #1b5e20;" onclick="playAudio('na.aac')">🔊 Cô Đọc</button>
                <button class="btn-mic" onclick="startListening('na', 'na.aac', this)">🎙️ Bé Nói</button>
            </div>
        </div>
    </div>
</div>

<div class="status-bubble" id="status-box">👂 Bé đọc to từ trên bảng nhé...</div>

<script>
    const recognition = (window.SpeechRecognition || window.webkitSpeechRecognition) ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
    let synth = window.speechSynthesis;
    let isListening = false;

    if (recognition) {
        recognition.lang = 'vi-VN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    } else {
        alert("Thiết bị này chưa hỗ trợ nhận dạng giọng nói. Bạn hãy mở bằng Google Chrome để trải nghiệm tốt nhất nhé!");
    }

    // Hàm phát giọng đọc chuẩn của giáo viên
    function playAudio(audioFile) {
        const audio = new Audio(audioFile);
        audio.play().catch(err => {
            console.log("Không tìm thấy file âm thanh chuẩn: " + audioFile);
        });
    }

    // Hàm phát âm thanh hệ thống (Đúng/Sai) qua trí tuệ nhân tạo text-to-speech của máy
    function systemSpeak(text, callback) {
        if (!synth) {
            if (callback) callback();
            return;
        }
        synth.cancel(); // Dừng phát tất cả âm thanh hệ thống cũ
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'vi-VN';
        utterance.rate = 1.0;
        utterance.pitch = 1.2; // Tăng cao độ nhẹ cho giọng nói trẻ trung, dễ thương
        
        utterance.onend = function() {
            if (callback) callback();
        };
        synth.speak(utterance);
    }

    function startListening(targetWord, spellingAudioFile, buttonElement) {
        if (isListening || !recognition) return;

        isListening = true;
        buttonElement.classList.add('listening');
        const statusBox = document.getElementById('status-box');
        statusBox.style.display = 'block';
        statusBox.innerText = "👂 Bé đọc to chữ '" + targetWord + "' lên nào...";

        recognition.start();

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript.toLowerCase().trim();
            statusBox.innerText = "Bé đã nói: \"" + transcript + "\"";
            
            // Loại bỏ các ký tự dấu chấm câu
            const cleanTranscript = transcript.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

            let isCorrect = false;

            if (targetWord === 'cha' && cleanTranscript === 'cha') {
                isCorrect = true;
            } else if (targetWord === 'tra' && cleanTranscript === 'tra') {
                isCorrect = true;
            } else if (targetWord === 'da' && (cleanTranscript === 'da' || cleanTranscript === 'da dẻ')) {
                isCorrect = true;
            } else if (targetWord === 'gia' && (cleanTranscript === 'gia' || cleanTranscript === 'gia đình')) {
                isCorrect = true;
            } else if (targetWord === 'la' && (cleanTranscript === 'la' || cleanTranscript === 'la hét')) {
                isCorrect = true;
            } else if (targetWord === 'na' && (cleanTranscript === 'na' || cleanTranscript === 'quả na')) {
                isCorrect = true;
            }

            if (isCorrect) {
                // Bé nói đúng -> AI hệ thống khen ngợi và tung hoa giấy lung linh
                systemSpeak("Tuyệt vời! Bé nói đúng rồi!", () => {
                    startConfetti();
                    setTimeout(stopConfetti, 3000);
                });
            } else {
                // Bé nói chưa đúng -> Hệ thống thông báo lỗi rồi tự động kích hoạt phát âm thanh cô giáo đọc mẫu
                systemSpeak("Chưa đúng rồi!", () => {
                    // Sau khi dứt lời nhắc nhở hệ thống, phát lại file gốc của cô giáo
                    playAudio(spellingAudioFile);
                });
            }
        };

        recognition.onerror = function() {
            statusBox.innerText = "Chưa nghe rõ, bé bấm nút nói lại nhé!";
            systemSpeak("Chưa đúng rồi!", () => {
                playAudio(spellingAudioFile);
            });
        };

        recognition.onend = function() {
            isListening = false;
            buttonElement.classList.remove('listening');
            setTimeout(() => {
                statusBox.style.display = 'none';
            }, 3000);
        };
    }

    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confettiActive = false;
    let pieces = [];
    const colors = ['#ff4081', '#ffeb3b', '#00e5ff', '#76ff03', '#e040fb', '#ff6d00'];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createPiece() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 12 + 8,
            color: colors[Math.floor(Math.random() * colors.length)],
            speedY: Math.random() * 5 + 4,
            speedX: Math.random() * 4 - 2,
            rotation: Math.random() * 360,
            rotationSpeed: Math.random() * 10 - 5
        };
    }

    function startConfetti() {
        confettiActive = true;
        pieces = [];
        for (let i = 0; i < 150; i++) {
            pieces.push(createPiece());
        }
        requestAnimationFrame(updateConfetti);
    }

    function stopConfetti() {
        confettiActive = false;
    }

    function updateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!confettiActive && pieces.length === 0) return;

        pieces.forEach((p, idx) => {
            p.y += p.speedY;
            p.x += p.speedX;
            p.rotation += p.rotationSpeed;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();

            if (p.y > canvas.height) {
                if (confettiActive) {
                    pieces[idx] = createPiece();
                } else {
                    pieces.splice(idx, 1);
                }
            }
        });

        if (confettiActive || pieces.length > 0) {
            requestAnimationFrame(updateConfetti);
        }
    }
</script>

</body>
</html>
